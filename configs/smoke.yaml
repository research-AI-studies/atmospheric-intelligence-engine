# Fast smoke-test config used by CI and `make smoke`.
# Targets the synthetic sample in data/sample/ and trains for a few epochs.
experiment_name: smoke
output_dir: artifacts/smoke
device: cpu
seed: 0

data:
  raw_path: "data/sample/synthetic_seberang_jaya.xlsx"
  processed_path: "data/processed/smoke_hourly.parquet"
  station_id: "CA06P"
  location: "Seberang Jaya, Pulau Pinang"
  timezone: "Asia/Kuala_Lumpur"
  max_gap_hours: 6

features:
  target: pm25
  lag_hours: [1, 3, 24]
  rolling_windows: [3, 24]
  include_calendar: true
  include_wind_components: true

splits:
  train_years: [2018]
  val_years: [2019]
  test_years: [2020]

models:
  - name: persistence
    horizons: [1, 24]
    input_window: 48
  - name: xgboost
    horizons: [1, 24]
    input_window: 48
    xgb_n_estimators: 50
    xgb_max_depth: 4
  - name: lstm
    horizons: [1, 24]
    input_window: 48
    hidden_size: 32
    num_layers: 1
    dropout: 0.1
    batch_size: 64
    epochs: 2
    lr: 0.002
    patience: 2
  - name: aie
    horizons: [1, 24]
    input_window: 48
    hidden_size: 32
    num_layers: 1
    dropout: 0.1
    mc_dropout_samples: 10
    batch_size: 64
    epochs: 2
    lr: 0.002
    patience: 2

scenarios:
  horizon_hours: 168
  temperature_delta_c: [0.0, 1.0]
  emission_scale: [0.9, 1.1]
  n_members: 4
